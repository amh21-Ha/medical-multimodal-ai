services:
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      - redis
      - postgres
      - mlflow

  worker:
    build: .
    command: celery -A workers.celery_app.celery_app worker --loglevel=INFO -Q analysis
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: multimodal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.15.1
    command: mlflow server --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"

volumes:
  postgres_data:
