apiVersion: apps/v1
kind: Deployment
metadata:
  name: multimodal-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: multimodal-postgres
  template:
    metadata:
      labels:
        app: multimodal-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: multimodal
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: multimodal-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: multimodal-secrets
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: multimodal-postgres
spec:
  selector:
    app: multimodal-postgres
  ports:
    - port: 5432
      targetPort: 5432
